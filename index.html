<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Programme Candito 6 Semaines — Suivi interactif d'entraînement powerlifting. Squat, Bench, Deadlift.">
    <title>Candito 6 Semaines — Programme</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- ==========================================
     SPLASH SCREEN (App Intro)
     ========================================== -->
<div id="splash-screen">
    <svg class="splash-logo" viewBox="0 0 200 200" width="120" height="120" style="color: var(--gold);">
        <path d="M 46 90 A 64 64 0 0 1 154 90" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
        <path d="M 46 110 A 64 64 0 0 0 154 110" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
        <g fill="currentColor">
            <circle cx="100" cy="100" r="16" fill="none" stroke="currentColor" stroke-width="4"/>
            <rect x="66" y="98" width="18" height="4" />
            <rect x="116" y="98" width="18" height="4" />
            <rect x="56" y="78" width="10" height="44" rx="2" /> 
            <rect x="134" y="78" width="10" height="44" rx="2" />
            <rect x="42" y="84" width="12" height="32" rx="2" />
            <rect x="146" y="84" width="12" height="32" rx="2" />
            <rect x="34" y="92" width="6" height="16" rx="1" />
            <rect x="160" y="92" width="6" height="16" rx="1" />
            <rect x="28" y="98" width="6" height="4" />
            <rect x="166" y="98" width="6" height="4" />
        </g>
    </svg>
</div>

<!-- Ambient Mesh Gradient Background -->
<div class="ambient-background" aria-hidden="true">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
</div>

<!-- ==========================================
     ONBOARDING
     ========================================== -->
<div id="onboarding">
    <div class="onb-card">
        <h1>Bienvenue.</h1>
        <p>Renseigne tes maxima actuels pour générer ton programme sur 6 semaines.</p>
        <div class="onb-fields">
            <div class="onb-field">
                <label for="onb-squat">Squat</label>
                <input type="number" id="onb-squat" value="150" inputmode="numeric" min="20" max="500">
                <span class="unit">kg</span>
            </div>
            <div class="onb-field">
                <label for="onb-bench">Bench</label>
                <input type="number" id="onb-bench" value="110" inputmode="numeric" min="20" max="400">
                <span class="unit">kg</span>
            </div>
            <div class="onb-field">
                <label for="onb-deadlift">Deadlift</label>
                <input type="number" id="onb-deadlift" value="170" inputmode="numeric" min="20" max="500">
                <span class="unit">kg</span>
            </div>
        </div>
        <button class="onb-btn" id="onb-go">Générer le programme</button>
    </div>
</div>

<div id="calc-overlay"></div>

<!-- ==========================================
     APPLICATION
     ========================================== -->
<div id="app" class="hidden">

    <!-- Luxury Premium Header Logo (Removed to Splash Screen) -->

    <!-- Main content -->
    <main id="main"></main>

    <!-- Footer -->
    <footer class="app-footer">
        <p style="color:var(--text-3);font-size:0.8125rem;margin-bottom:16px">Programme Candito 6 Semaines — v1.0</p>
        <button class="btn btn-outline btn-sm" id="btn-reset">Réinitialiser le programme</button>
    </footer>

    <!-- ==========================================
         NAVIGATION "DYNAMIC PILL"
         ========================================== -->
    <div id="dynamic-nav-container">
        <button id="nav-pill" aria-haspopup="dialog" aria-expanded="false" aria-label="Ouvrir le menu">
            <span class="pill-icon">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </span>
            <span id="pill-text">Menu</span>
        </button>
    </div>

    <!-- ==========================================
         FULLSCREEN MENU BENTO
         ========================================== -->
    <div id="fullscreen-menu" role="dialog" aria-modal="true" class="hidden">
        <div class="menu-header">
            <h2 class="menu-title">Navigation</h2>
            <button id="menu-close-btn" aria-label="Fermer le menu">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
        </div>
        <div class="bento-grid" id="bento-grid">
            <!-- Injecté via nav.js -->
        </div>
    </div>
</div>

<!-- ==========================================
     TUNNEL VISION — Focus Mode Overlay
     ========================================== -->
<div id="tunnel-vision-overlay" role="dialog" aria-modal="true" aria-label="Mode Focus">
    <button class="tunnel-btn-close" id="tunnel-close" aria-label="Fermer le mode focus">✕</button>
    <span class="tunnel-lift-name" id="tunnel-lift-name"></span>
    <div class="tunnel-load-wrap">
        <span class="tunnel-load" id="tunnel-load"></span>
        <span class="tunnel-unit">kg</span>
    </div>
    <button class="tunnel-btn-validate" id="tunnel-validate">VALIDER</button>
</div>

<script type="module" src="js/app.js"></script>

<script>
    // Splash Screen Logic
    document.addEventListener("DOMContentLoaded", () => {
        const splash = document.getElementById("splash-screen");
        if (splash) {
            // Fade out the overlay
            setTimeout(() => {
                splash.classList.add("splash-hidden");
            }, 1800); // 1.8s (Logo animates then fades)

            // Remove entirely to free up the DOM and interaction
            setTimeout(() => {
                splash.style.display = "none";
            }, 2400); // 1.8s + 0.6s fade
        }
    });
</script>

</body>
</html>
